<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unauthorized Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #1a1a1a, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 50px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.4);
            animation: fadeIn 1.2s ease-in-out;
        }

        .icon {
            font-size: 80px;
            color: #ff3b3b;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        h1 {
            font-size: 36px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #ff4d4d;
        }

        p {
            font-size: 16px;
            opacity: 0.85;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            padding: 12px 30px;
            font-size: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff4d4d, #ff0000);
            color: #fff;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.6);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.6;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🚫</div>
    <h1>UNAUTHORIZED ACCESS</h1>
    <p>
        You do not have permission to view this page.<br>
        This incident has been logged for security purposes.
    </p>
    <button class="btn" onclick="goBack()">Go Back</button>
    <div class="footer">
        © 2026 Secure System
    </div>
</div>

<script>
    function goBack() {
        window.history.back();
    }

    // Optional: auto-redirect after 10 seconds
    setTimeout(() => {
        window.location.href = "/";
    }, 10000);
</script>

</body>
</html>
